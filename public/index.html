<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大模型测评榜</title>
  <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml" sizes="any" />
  <link rel="icon" href="/favicon-32.png?v=3" type="image/png" sizes="32x32" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <h1 class="title">大模型测评榜</h1>
    </div>
    <div class="topbar-right">
      <span id="saveStatus" class="save-status"></span>
      <button id="addLineBtn" class="btn edit-only" hidden>+ 基准线</button>
      <button id="addBtn" class="btn edit-only" hidden>+ 添加模型</button>
      <button id="loginBtn" class="btn">编辑</button>
      <button id="logoutBtn" class="btn edit-only" hidden>退出编辑</button>
    </div>
  </header>

  <main>
    <!-- Hero -->
    <div class="hero">
      <h2 class="hero-title">THE&nbsp;RANKING</h2>
      <p class="hero-sub">主观排行 - 依据实际体验</p>
    </div>

    <!-- The board. Blocks and lines are absolutely positioned inside .board-inner. -->
    <div id="board" class="board">
      <div id="boardInner" class="board-inner">
        <div class="axis-label axis-top">强 · S 段</div>
        <div class="axis-label axis-bottom">弱 · 淘汰区</div>
        <!-- custom baseline lines injected here -->
        <div id="prodLine" class="prod-line prod-line--main">
          <span class="line-label prod-line-label"></span>
        </div>
        <!-- model blocks injected here -->
      </div>
    </div>
  </main>

  <!-- Detail / edit side panel -->
  <aside id="panel" class="panel" hidden>
    <button id="panelClose" class="panel-close" aria-label="关闭">×</button>
    <div class="panel-head">
      <div class="panel-title-row">
        <img id="panelIcon" class="panel-icon" alt="" />
        <h2 id="panelName" class="panel-name"></h2>
      </div>
      <input id="panelNameInput" class="panel-name-input edit-only" hidden />
    </div>

    <section class="panel-section edit-only" hidden>
      <h3>图标</h3>
      <select id="panelLogoSelect" class="panel-select">
        <option value="">自动识别（按名字）</option>
        <!-- built-in icon options injected here -->
        <option value="__custom__">自定义图片 URL…</option>
      </select>
      <input id="panelLogoInput" class="panel-name-input" placeholder="粘贴图片 URL" hidden />
      <div class="logo-hint">选“自动识别”会根据模型名匹配内置 logo；也可直接指定或填自定义图片。</div>
    </section>

    <section class="panel-section">
      <h3>标签</h3>
      <div id="panelTags" class="tag-list"></div>
      <div class="tag-add edit-only" hidden>
        <input id="tagInput" placeholder="加标签后回车" />
        <div id="tagSuggestions" class="tag-suggestions" hidden></div>
      </div>
    </section>

    <section class="panel-section">
      <h3>评论</h3>
      <div class="comment-add edit-only" hidden>
        <textarea id="commentInput" placeholder="写一条新评论…"></textarea>
        <button id="commentAddBtn" class="btn">添加评论</button>
      </div>
      <ol id="commentList" class="comment-list"></ol>
    </section>

    <section class="panel-section edit-only" hidden>
      <button id="deleteModelBtn" class="btn btn-danger">删除该模型</button>
    </section>
  </aside>

  <!-- Hover tip: latest comment on a model block -->
  <div id="blockTip" class="block-tip" hidden></div>

  <!-- Login modal -->
  <div id="loginModal" class="modal" hidden>
    <div class="modal-box">
      <h2>输入密码进入编辑</h2>
      <div class="password-field">
        <input id="passwordInput" type="password" placeholder="密码" autocomplete="current-password" />
        <button type="button" id="passwordToggle" class="password-toggle" aria-label="显示密码" title="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 5c-5 0-9.27 3.11-11 7.5C2.73 16.89 7 20 12 20s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg>
          <svg class="eye-off" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M2.1 3.51L3.51 2.1l18.39 18.39-1.41 1.41-3.28-3.28A11.7 11.7 0 0112 20c-5 0-9.27-3.11-11-7.5a12.4 12.4 0 014.1-5.05L2.1 3.51zM12 7c2.76 0 5 2.24 5 5 0 .7-.15 1.36-.41 1.96l-1.57-1.57A2.97 2.97 0 0015 12a3 3 0 00-3-3c-.4 0-.78.08-1.13.23L9.3 7.66C10.1 7.24 11.02 7 12 7zm-5 5c0-.4.06-.78.16-1.14L4.7 8.4A10.4 10.4 0 003 12.5C4.73 16.89 9 20 12 20c1.3 0 2.53-.25 3.66-.7l-2.2-2.2A4.98 4.98 0 017 12z"/></svg>
        </button>
      </div>
      <div id="loginError" class="login-error" hidden>密码错误，请重试</div>
      <div class="modal-actions">
        <button id="loginCancel" class="btn">取消</button>
        <button id="loginSubmit" class="btn btn-primary">进入</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
